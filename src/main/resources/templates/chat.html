<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/chat.css}">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.1/stomp.min.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>
                <i class="fas fa-comments"></i>
                Chat Room
            </h2>
            <div class="status">
                <span class="status-dot"></span>
                <span id="connectionStatus">Connecting...</span>
            </div>
        </div>

        <div class="chat-messages" id="chat">
            <div class="empty-state" id="emptyState">
                <i class="fas fa-comments"></i>
                <p>Welcome to the chat!<br>Enter your name and start messaging.</p>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <i class="fas fa-ellipsis-h"></i> Someone is typing...
        </div>

        <div class="chat-input-area">
            <div class="username-section">
                <label><i class="fas fa-user"></i> Your Name:</label>
                <div class="username-input">
                    <input type="text" id="senderInput" placeholder="Enter your name" maxlength="20">
                </div>
            </div>
            <div class="input-group-custom">
                <div class="message-input-wrapper">
                    <input type="text" id="messageInput" class="message-input" placeholder="Type a message..." maxlength="500">
                </div>
                <button id="sendMessage" class="send-btn" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        let stompClient = null;
        let currentUser = '';
        let hasMessages = false;

        function setConnected(connected) {
            const sendBtn = document.getElementById('sendMessage');
            const statusEl = document.getElementById('connectionStatus');
            
            sendBtn.disabled = !connected;
            statusEl.textContent = connected ? 'Connected' : 'Disconnected';
            statusEl.style.color = connected ? '#4ade80' : '#f87171';
        }

        function connect() {
            const socket = new SockJS('/chat');
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, function (frame) {
                setConnected(true);
                stompClient.subscribe('/topic/messages', function (message) {
                    showMessage(JSON.parse(message.body));
                });
            }, function(error) {
                setConnected(false);
                setTimeout(connect, 3000);
            });
        }

        function getInitials(name) {
            return name ? name.substring(0, 2).toUpperCase() : '?';
        }

        function formatTime() {
            const now = new Date();
            return now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: true 
            });
        }

        function showMessage(message) {
            const chat = document.getElementById('chat');
            const emptyState = document.getElementById('emptyState');
            
            if (emptyState) {
                emptyState.remove();
            }

            const isOwn = message.sender === currentUser;
            const messageEl = document.createElement('div');
            messageEl.className = `message ${isOwn ? 'own' : ''}`;
            
            messageEl.innerHTML = `
                <div class="message-avatar">${getInitials(message.sender)}</div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(message.content)}</div>
                    <div class="message-info">
                        <span class="message-sender">${escapeHtml(message.sender)}</span>
                        <span class="message-time">${formatTime()}</span>
                    </div>
                </div>
            `;
            
            chat.appendChild(messageEl);
            chat.scrollTop = chat.scrollHeight;
            hasMessages = true;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendMessage() {
            const senderInput = document.getElementById('senderInput');
            const messageInput = document.getElementById('messageInput');
            
            const sender = senderInput.value.trim();
            const content = messageInput.value.trim();
            
            if (!sender) {
                senderInput.focus();
                senderInput.style.borderColor = '#f87171';
                setTimeout(() => senderInput.style.borderColor = '', 2000);
                return;
            }
            
            if (!content || !stompClient) return;
            
            currentUser = sender;
            senderInput.disabled = true;
            
            const chatMessage = {
                sender: sender,
                content: content
            };
            
            stompClient.send("/app/sendMessage", {}, JSON.stringify(chatMessage));
            messageInput.value = '';
            messageInput.focus();
        }

        document.getElementById('sendMessage').onclick = sendMessage;
        
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        document.getElementById('senderInput').addEventListener('input', function() {
            currentUser = this.value.trim();
        });

        window.onload = connect;
    </script>
</body>
</html>
